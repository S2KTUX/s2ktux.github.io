<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#f6ecd9;--surface:#fbf3e2;--surface2:#e7d3ae;--line:#4a3627;--text:#6b543f;--head:#7a4a2b;--muted:#8a7259}
  html.dark{--bg:#1e1811;--surface:#2a2219;--surface2:#382d20;--line:#7a6449;--text:#e6d5b8;--head:#f8cf90;--muted:#c4ab89}
  body{background:var(--bg);color:var(--text);font-family:'VT323',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;transition:background-color .25s ease,color .25s ease}
  a{color:#d97757;text-decoration:none}
  a:hover{color:#c2650a}
  html.dark a{color:#ef8a5f}
  html.dark a:hover{color:#f2a071}
  a:focus-visible,button:focus-visible{outline:3px solid #d97757;outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
  @keyframes blink{50%{opacity:0}}
</style>
<script>
  try{ if(localStorage.getItem('s2ktux-theme')==='dark') document.documentElement.classList.add('dark'); }catch(e){}
</script>
</head>
<body>
  <div style="width:100%;max-width:560px;text-align:center">
