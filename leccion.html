  <style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);font-family:'VT323',monospace;color:var(--text)}
  :root{--bg:#f6ecd9;--surface:#fbf3e2;--surface2:#e7d3ae;--line:#4a3627;--text:#6b543f;--head:#7a4a2b;--muted:#8a7259;--soft2:#d0b58a;--accent:#d97757;--border-color:#4a3627;--card-bg:#fbf3e2;--text-muted:#8a7259}

  #backtop{position:fixed;right:20px;bottom:20px;z-index:90;display:none;align-items:center;justify-content:center;width:46px;height:46px;background:var(--surface);color:var(--head);border:3px solid var(--line);box-shadow:3px 3px 0 var(--line);cursor:pointer;font-size:20px;line-height:1}
  #backtop.show{display:flex}
  #lesson .codewrap{position:relative}
  #lesson .copybtn{position:absolute;top:8px;right:8px;font-family:'Share Tech Mono',monospace;font-size:13px;background:var(--surface2);color:var(--head);border:2px solid var(--line);padding:4px 9px;cursor:pointer;opacity:.85}

  /* ---- estilos del lector de lecciones ---- */
  #lesson .lesson-wrapper{max-width:1000px;margin:0 auto}
  #lesson .lesson-header{border-bottom:3px solid var(--line);padding-bottom:26px;margin-bottom:30px}
  #lesson .lesson-header .badge{display:inline-block;font-family:'Press Start 2P',monospace;font-size:10px;background:var(--accent);color:#fff;padding:8px 12px;margin-bottom:18px}
  #lesson .lesson-header h1{font-family:'Press Start 2P',monospace;font-size:24px;line-height:1.5;color:var(--head);margin-bottom:14px}
  #lesson .lesson-header>p{font-family:'Space Mono',monospace;font-size:18px;color:var(--text);line-height:1.5;max-width:680px}
  #lesson .video-card{display:inline-flex;align-items:center;gap:14px;margin-top:22px;background:var(--surface);border:3px solid var(--line);box-shadow:4px 4px 0 var(--surface2);padding:14px 18px;text-decoration:none}

  #lesson .video-icon{font-size:26px}
  #lesson .video-text{display:flex;flex-direction:column;line-height:1.2}
  #lesson .video-text strong{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--head)}

  #lesson .lesson-layout{display:grid;grid-template-columns:230px 1fr;gap:36px;align-items:start}
  #lesson .lesson-toc{position:sticky;top:90px;background:var(--surface);border:3px solid var(--line);box-shadow:5px 5px 0 var(--surface2);padding:20px}

  #lesson .info-item{background:var(--surface);border:3px solid var(--line);box-shadow:4px 4px 0 var(--surface2);padding:16px;font-size:17px;line-height:1.35;color:var(--text)}
  #lesson .info-item strong{color:var(--head);font-family:'Share Tech Mono',monospace}
  #lesson .lesson-alert{background:var(--surface);border:3px solid var(--line);border-left:8px solid var(--accent) !important;padding:16px 18px;margin:18px 0;font-size:19px;color:var(--text)}
  #lesson .next-btn{display:inline-block;background:var(--accent);color:#fff;font-family:'Press Start 2P',monospace;font-size:11px;padding:14px 22px;border:3px solid var(--line);box-shadow:4px 4px 0 var(--line);margin-top:10px}
  @media(max-width:760px){#lesson .lesson-layout{grid-template-columns:1fr}#lesson .lesson-toc{position:static}}

  /* --- responsive (móvil) --- */
  @media(max-width:860px){
    [style*="grid-template-columns: 1fr 1fr"]{grid-template-columns:1fr !important}

<script>
(function(){
  try{ if(localStorage.getItem('s2ktux-theme')==='dark') document.documentElement.classList.add('dark'); }catch(e){}
  function updateIcons(){ var dark=document.documentElement.classList.contains('dark'); document.querySelectorAll('[data-theme-icon]').forEach(function(el){ el.textContent=dark?'\u2600':'\u263e'; }); }
  window.__toggleTheme=function(){ var h=document.documentElement; h.classList.toggle('dark'); var dark=h.classList.contains('dark'); try{ localStorage.setItem('s2ktux-theme', dark?'dark':'light'); }catch(e){} updateIcons(); };
  window.openReader=function(){}; /* no-op: los repasos se abren aparte */
  if(!window.__s2kThemeInit){ window.__s2kThemeInit=true;
    document.addEventListener('click', function(e){ var b=e.target && e.target.closest && e.target.closest('[data-theme-toggle]'); if(b){ e.preventDefault(); window.__toggleTheme(); } });
  }
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(updateIcons,150); });
  setTimeout(updateIcons,150); setTimeout(updateIcons,600);
  (function(){ function upd(){ var b=document.getElementById('backtop'); if(b) b.classList.toggle('show', window.pageYOffset>400); } window.addEventListener('scroll',upd,{passive:true}); document.addEventListener('DOMContentLoaded',function(){setTimeout(upd,300);}); setTimeout(upd,500); setTimeout(upd,1200); })();
})();
</script>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { status: "Cargando lección…" };
  // Rutas reales de los ficheros de lección copiados del repo
  files = {
    rhcsa: Array.from({length:11}, (_,i)=> i<10 ? "rhcsa/"+(i+1)+"/"+(i+1)+".html" : "rhcsa/11/11.html"),
    lpic1: ["lpic/101/1.html","lpic/102/2.html","lpic/103/3.html","lpic/104/4.html","lpic/105/5.html","lpic/106/106.html","lpic/107/7.html","lpic/108/8.html","lpic/109/9.html","lpic/110/10.html"],
    docker: ["","",""]
  };
  params() {
    const p = new URLSearchParams(location.search);
    const cp = p.get('c'); const c = (cp === 'lpic1' || cp === 'docker') ? cp : 'rhcsa';
    let m = parseInt(p.get('m') || '0', 10); if (isNaN(m) || m < 0) m = 0;
    const list = this.files[c]; if (m >= list.length) m = list.length - 1;
    return { c, m, list };
  }
  componentDidMount() { this.load(); this.wireReadButton(); let n = 0; const iv = setInterval(() => { this.setMeta(); if (++n >= 10) clearInterval(iv); }, 150); }
  setMeta() {
    try {
      const { c, m, list } = this.params();
      const courseName = c === 'lpic1' ? 'LPIC-1' : c === 'docker' ? 'Docker' : 'RHCSA';
      const unit = c === 'docker' ? 'Clase' : 'Tema';
      const t = courseName + ' · ' + unit + ' ' + (m + 1) + ' de ' + list.length + ' · S2KTUX';
      const desc = 'Lección ' + (m + 1) + ' del curso ' + courseName + ': teoría, ejemplos e imágenes para preparar tu certificación Linux.';
      const base = 'https://s2ktux.github.io/leccion.html?c=' + c + '&m=' + m;
      document.title = t;
      setTimeout(() => { try { document.title = t; } catch (e) {} }, 80);
      const set = (sel, attr, val) => { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); };
      set('link[rel="canonical"]', 'href', base);
      set('meta[property="og:url"]', 'content', base);
      set('meta[property="og:title"]', 'content', t);
      set('meta[name="twitter:title"]', 'content', t);
      set('meta[name="description"]', 'content', desc);
      set('meta[property="og:description"]', 'content', desc);
      set('meta[name="twitter:description"]', 'content', desc);
      // Datos estructurados: Course + VideoObject + BreadcrumbList
      try {
        const mod = ((window.S2KTUX_COURSES || {})[c === 'lpic1' ? 'lpic1' : c] || { modules: [] }).modules[m] || {};
        const video = mod.video || '';
        const home = 'https://s2ktux.github.io/';
        const ld = {
          "@context": "https://schema.org", "@graph": [
            { "@type": "Course", "name": (mod.title || (unit + ' ' + (m + 1))) + ' — ' + courseName, "description": (mod.desc || desc), "inLanguage": "es", "url": base,
              "provider": { "@type": "Organization", "name": "S2KTUX", "url": home } },
            { "@type": "BreadcrumbList", "itemListElement": [
              { "@type": "ListItem", "position": 1, "name": "Inicio", "item": home },
              { "@type": "ListItem", "position": 2, "name": "Cursos", "item": home + "cursos.html" },
              { "@type": "ListItem", "position": 3, "name": courseName, "item": home + "curso.html?c=" + c },
              { "@type": "ListItem", "position": 4, "name": unit + ' ' + (m + 1), "item": base } ] }
          ]
        };
        if (video) ld["@graph"].push({ "@type": "VideoObject", "name": (mod.title || courseName) + ' — vídeo', "description": (mod.desc || desc), "thumbnailUrl": home + "assets/og.png", "uploadDate": "2024-01-01", "contentUrl": video, "embedUrl": video.replace('youtu.be/', 'www.youtube.com/embed/') });
        let s = document.getElementById('lesson-jsonld');
        if (!s) { s = document.createElement('script'); s.type = 'application/ld+json'; s.id = 'lesson-jsonld'; document.head.appendChild(s); }
        s.textContent = JSON.stringify(ld);
      } catch (e) {}
    } catch (e) {}
  }
  wireReadButton() {
    try {
      const { c, m } = this.params();
      const KEY = 's2ktux-read';
      const btn = document.getElementById('lesson-read');
      if (!btn) return;
      const getMap = () => { try { return JSON.parse(localStorage.getItem(KEY) || '{}') || {}; } catch (e) { return {}; } };
      const id = c + ':' + m;
      const paint = () => { const done = !!getMap()[id]; btn.textContent = done ? '✔ Leída' : 'Marcar como leída'; btn.style.background = done ? '#5a8a3c' : 'var(--surface)'; btn.style.color = done ? '#fff' : 'var(--head)'; };
      btn.addEventListener('click', () => { const map = getMap(); if (map[id]) delete map[id]; else map[id] = true; try { localStorage.setItem(KEY, JSON.stringify(map)); } catch (e) {} paint(); });
      paint();
    } catch (e) {}
  }
  wireImageZoom() {
    try {
      const el = this.lessonEl; if (!el) return;
      let lb = document.getElementById('img-lightbox');
      if (!lb) {
        lb = document.createElement('div'); lb.id = 'img-lightbox';
        lb.innerHTML = '<button class="lb-close" aria-label="Cerrar">\u2715</button><img alt="">';
        document.body.appendChild(lb);
        const close = () => lb.classList.remove('open');
        lb.addEventListener('click', close);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
      }
      const big = lb.querySelector('img');
      el.querySelectorAll('img').forEach((im) => {
        im.addEventListener('click', () => { big.src = im.src; big.alt = im.alt || ''; lb.classList.add('open'); });
      });
    } catch (e) {}
  }
  addCopyButtons() {
    try {
      const el = this.lessonEl; if (!el) return;
      el.querySelectorAll('pre').forEach((pre) => {
        if (pre.parentElement && pre.parentElement.classList.contains('codewrap')) return;
        const wrap = document.createElement('div'); wrap.className = 'codewrap';
        pre.parentNode.insertBefore(wrap, pre); wrap.appendChild(pre);
        const b = document.createElement('button'); b.className = 'copybtn'; b.type = 'button'; b.textContent = 'Copiar'; b.setAttribute('aria-label', 'Copiar código');
        b.addEventListener('click', () => { const txt = pre.innerText; const done = () => { b.textContent = '✔ Copiado'; setTimeout(() => { b.textContent = 'Copiar'; }, 1400); }; if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(txt).then(done, done); } else { try { const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); } catch (e) {} done(); } });
        wrap.appendChild(b);
      });
    } catch (e) {}
  }
  async load() {
    const { c, m, list } = this.params();
    if (c === 'docker') { this.renderComingSoon(m); return; }
    try {
      const CDN = 'https://cdn.jsdelivr.net/gh/S2KTUX/s2ktux.github.io@main/images/';
      let html;
      const CACHE = 's2ktux-lesson:' + list[m];
      try { html = sessionStorage.getItem(CACHE) || null; } catch (e) { html = null; }
      if (html == null) {
        const res = await fetch(list[m]);
        if (!res.ok) throw new Error("HTTP " + res.status);
        html = await res.text();
        html = html.replace(/<style[\s\S]*?<\/style>/gi, '').replace(/<script[\s\S]*?<\/script>/gi, '').replace(/<link[^>]*>/gi, '');
        // imágenes servidas por CDN (jsDelivr) + carga diferida
        html = html.replace(/(src|href)=(["'])\/images\//g, '$1=$2' + CDN);
        html = html.replace(/<img /gi, '<img loading="lazy" decoding="async" ');
        try { sessionStorage.setItem(CACHE, html); } catch (e) {}
      }
      const el = this.lessonEl;
      if (el) { el.innerHTML = html; setTimeout(() => { this.addCopyButtons(); this.wireImageZoom(); }, 120); }
    } catch (e) {
      const el = this.lessonEl;
      if (el) el.innerHTML = '<div style="text-align:center;padding:70px 0;font-family:\'Share Tech Mono\',monospace;color:#ef8a7a">No se pudo cargar la lección. Vuelve a Cursos e inténtalo de nuevo.</div>';
    }
  }
  renderComingSoon(m) {
    const el = this.lessonEl; if (!el) return;
    const mod = (((window.S2KTUX_COURSES || {}).docker) || { modules: [] }).modules[m] || {};
    const title = mod.title || ('Clase ' + (m + 1));
    const topics = (mod.topics || []).map(t => '<li>' + t + '</li>').join('');
    el.innerHTML = '<div class="lesson-wrapper"><div class="lesson-header">'
      + '<span class="badge" style="background:#6b8e9e">DOCKER \u00b7 CLASE ' + (m + 1) + '</span>'
      + '<h1>' + title + '</h1>'
      + '<p>Esta clase est\u00e1 en preparaci\u00f3n. Muy pronto tendr\u00e1s aqu\u00ed la teor\u00eda, los ejemplos y los laboratorios.</p></div>'
      + '<div class="lesson-alert" style="text-align:center;border-left-color:#6b8e9e !important;font-family:\'Press Start 2P\',monospace;font-size:12px;line-height:1.8">\u23f3 PR\u00d3XIMAMENTE</div>'
      + (topics ? '<div class="lesson-section"><h3>Lo que ver\u00e1s en esta clase</h3><ul>' + topics + '</ul></div>' : '')
      + '</div>';
  }
  renderVals() {
    const { c, m, list } = this.params();
    const courseName = c === 'lpic1' ? 'LPIC-1' : c === 'docker' ? 'Docker' : 'RHCSA';
    const unit = c === 'docker' ? 'Clase' : 'Tema';
    return {
      status: this.state.status,
      lessonRef: (el) => { this.lessonEl = el; },
      backHref: "curso.html?c=" + c,
      backLabel: "Volver a " + courseName,
      crumb: courseName + " · " + unit + " " + (m + 1) + " / " + list.length,
      hasPrev: m > 0,
      hasNext: m < list.length - 1,
      prevHref: "leccion.html?c=" + c + "&m=" + (m - 1),
      nextHref: "leccion.html?c=" + c + "&m=" + (m + 1)
    };
  }
}
</script>
</body>
</html>
